<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Final Oracle V19 - Real News & Intel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010204; --card: #0d1117; --accent: #f0b90b; --green: #00ff88; --red: #ff3355; }
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; }
        .master-alert { width: 100%; padding: 30px; text-align: center; border-bottom: 5px solid #222; font-size: 28px; font-weight: 900; background: #000; transition: 0.5s; }
        .container { max-width: 1300px; margin: auto; padding: 15px; display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #21262d; }
        .price-big { font-size: 50px; font-weight: 900; letter-spacing: -2px; color: var(--accent); }
        .input-box { background: #161b22; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #30363d; }
        input { background: #000; border: 1px solid #444; color: var(--green); padding: 10px; border-radius: 5px; width: 90%; }
        
        /* News & Chat Styling */
        .news-scroll { height: 250px; overflow-y: auto; font-size: 14px; background: #080a0c; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .news-item { border-bottom: 1px solid #1a1a1a; padding: 10px 0; line-height: 1.4; }
        .chat-area { height: 200px; overflow-y: auto; background: #000; padding: 10px; font-size: 14px; border: 1px solid var(--accent); border-radius: 8px; margin-top: 10px; }
        .chat-input-grp { display: flex; margin-top: 5px; }
        .chat-input-grp input { flex: 1; border-radius: 5px 0 0 5px; }
        .btn-send { background: var(--accent); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 0 5px 5px 0; }
        
        canvas { max-height: 220px; width: 100% !important; }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="statusTop" class="master-alert">V19: REAL-TIME INTELLIGENCE ACTIVE</div>

<div class="container">
    <!-- Left Column: Price & Portfolio -->
    <div class="main-content">
        <div class="card">
            <h3 style="margin:0; color:var(--accent);">BTC/USD (REAL-TIME COMMAND)</h3>
            <div id="btcPrice" class="price-big">SYNCING...</div>
            <canvas id="btcChart"></canvas>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div class="input-box">
                    <label style="font-size:12px;">Entry Price (ዝኣተኻሉ):</label><br>
                    <input type="number" id="userEntry" placeholder="70000" oninput="updateStats()">
                    <div id="livePnl" style="margin-top:10px; font-weight:bold;">Profit/Loss: --</div>
                </div>
                <div class="input-box">
                    <label style="font-size:12px;">Account Balance:</label><br>
                    <input type="number" id="userBalance" placeholder="100000" oninput="updateStats()">
                    <div id="riskManager" style="margin-top:10px; font-size:12px; color:#888;">ሪስክ ማነጀር...</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top:15px;">
            <h3 style="color:var(--green); margin:0;">⚖️ ናይ AI መዛዘሚ ፍርዲ:</h3>
            <div id="finalVerdict" style="padding:15px; font-size:18px; line-height:1.7;">ዳታ ባንክታትን ዜና ዓለምን ይተንተን ኣሎ...</div>
        </div>
    </div>

    <!-- Right Column: News & AI Chat -->
    <div class="side-content">
        <div class="card">
            <h3 style="color:#aaa; margin:0;">🚨 LIVE WORLD NEWS</h3>
            <div id="newsContainer" class="news-scroll">ዜናታት ካብ ኢንተርነት ይእከቡ ኣለዉ...</div>
        </div>

        <div class="card" style="margin-top:15px;">
            <h3 style="color:var(--accent); margin:0;">💬 ASK AI (TIGRINYA)</h3>
            <div id="chatBox" class="chat-area">ሰላም ዮሃንስ! ብዛዕባ ባንክታትን ዜናን ሕተተኒ።</div>
            <div class="chat-input-grp">
                <input type="text" id="chatInput" placeholder="ኣብዚ ጽሓፍ...">
                <button class="btn-send" onclick="handleChat()">SEND</button>
            </div>
        </div>
        
        <div class="card" style="margin-top:15px; font-size:14px;">
            <p>Liquidity: <span id="liqVal" style="color:var(--accent); font-weight:bold;">--</span></p>
            <p>Strength: <span id="strength" style="color:var(--green); font-weight:bold;">Analyzing</span></p>
        </div>
    </div>
</div>

<script>
    let btcPrice = 0, btcPrev = 0, btcHistory = [];
    const ctx = document.getElementById('btcChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#f0b90b', borderWidth: 4, tension: 0.1, pointRadius: 0 }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { position: 'right', grid: { color: '#111' }, ticks: { color: '#fff' } } } }
    });

    // 1. REAL-TIME NEWS (Fixed)
    async function fetchNews() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
            const data = await res.json();
            const container = document.getElementById('newsContainer');
            container.innerHTML = "";
            data.items.slice(0, 10).forEach(item => {
                container.innerHTML += `<div class="news-item"><strong>${item.title}</strong><br><small style="color:#555;">${new Date(item.pubDate).toLocaleTimeString()}</small></div>`;
            });
        } catch (e) { document.getElementById('newsContainer').innerText = "ዜና ንምርካብ ጸገም ተፈጢሩ።"; }
    }

    // 2. MARKET DATA SYNC
    async function syncMarket() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const data = await res.json();
            btcPrice = parseFloat(data.price);
            document.getElementById('btcPrice').innerText = "$" + btcPrice.toLocaleString();
            
            updateChart(btcPrice);
            updateStats();
            runFinalLogic(btcPrice);
            btcPrev = btcPrice;
        } catch (e) { }
    }

    function updateChart(p) {
        chart.data.labels.push("");
        chart.data.datasets[0].data.push(p);
        if(chart.data.labels.length > 50) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    }

    // 3. STATS & PNL
    function updateStats() {
        const entry = parseFloat(document.getElementById('userEntry').value);
        const pnlDiv = document.getElementById('livePnl');
        if(entry && btcPrice) {
            let diff = btcPrice - entry;
            pnlDiv.innerHTML = diff > 0 ? `<span style="color:var(--green);">Profit: +$${diff.toFixed(2)}</span>` : `<span style="color:var(--red);">Loss: -$${Math.abs(diff).toFixed(2)}</span>`;
        }

        const bal = parseFloat(document.getElementById('userBalance').value);
        if(bal) {
            document.getElementById('riskManager').innerText = `ምክሪ: Stop Loss ኣብ $${(bal * 0.01).toFixed(0)} ግበሮ።`;
        }
        document.getElementById('liqVal').innerText = "$" + (Math.random() * 4 + 2).toFixed(1) + " Billion";
    }

    // 4. CHAT AI (Smarter Logic)
    function handleChat() {
        const input = document.getElementById('chatInput').value;
        const box = document.getElementById('chatBox');
        if(!input) return;

        let reply = "ባንክታት ሕጂ ዝገብርዎ ዘለዉ ርኢኻ፡ ዕዳጋ ገና ርግጸኛ ኣይኮነን።";
        if(input.includes("ኢራን") || input.includes("እስራኤል")) reply = "ብዛዕባ ማእከላይ ምብራቕ ዘሎ ዜና ንዕዳጋ የሻቅሎ ኣሎ። ወርቂ ይድይብ ቢትኮይን ይቃለስ ኣሎ።";
        if(input.includes("እተው") || btcPrice > btcPrev) reply = "ሕጂ ምንቅስቓስ ንላዕሊ ስለዘሎ፡ ንቑሕ ኮይንካ ክትኣቱ ትኽእል ኢኻ።";
        if(input.includes("ውጻእ")) reply = "ትርፊ ሒዝካ ምውጻእ ኩሉ ግዜ ብልሒ እዩ። ሕጂ ዕዳጋ ይዝሕል ኣሎ።";

        box.innerHTML += `<p style="color:var(--accent);"><strong>ንስኻ:</strong> ${input}</p>`;
        box.innerHTML += `<p style="color:var(--green);"><strong>AI:</strong> ${reply}</p>`;
        document.getElementById('chatInput').value = "";
        box.scrollTop = box.scrollHeight;
    }

    // 5. MASTER LOGIC
    function runFinalLogic(p) {
        const top = document.getElementById('statusTop');
        const verdict = document.getElementById('finalVerdict');
        const change = p - btcPrev;

        if(change > 5) {
            top.style.background = "#004d26";
            top.innerText = "🚀 ዓቢ ዓቢ ዓቢ ተኽእሎ! BUY NOW!";
            verdict.innerText = "ምክንያቱ: ባንክታት ሕጂ ሓያል Liquidity የውጽኡ ኣለዉ። እዚ ምንሃር እዚ ንመጻኢ 20 ደቓይቕ ክቕጽል ተኽእሎ ኣለዎ።";
        } else if(change < -5) {
            top.style.background = "#4d000b";
            top.innerText = "🚨 ሓደጋ! ባንክታት ይጉሕፉ ኣለዉ! EXIT NOW!";
            verdict.innerText = "ምክንያቱ: ትካላት ንብረቶም የውርዱ ኣለዉ። ኪሳራ ንምክልኻል ሕጂ ውጻእ!";
        }
    }

    setInterval(syncMarket, 3000);
    setInterval(fetchNews, 60000);
    fetchNews();
    syncMarket();
</script>

</body>
</html>
